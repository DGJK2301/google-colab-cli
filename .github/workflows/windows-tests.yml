name: Windows tests

on:
  pull_request:
  push:
    branches:
      - main
      - "agent/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --locked --dev
      - name: Lint
        run: uv run ruff check src tests
      - name: Format check
        run: uv run ruff format --check src tests
      - name: Unit tests
        run: uv run pytest tests/ -q --basetemp .pytest-tmp
